<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Song 🎵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink: #FF69B4;
            --rose-gold: #B76E79;
            --white: #FFFFFF;
            --purple: #9B59B6;
            --soft-gold: #FFD700;
            --light-pink: #FFB6C1;
            --dark-pink: #FF1493;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #ffd89b 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.7;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Floating Hearts */
        .heart {
            position: fixed;
            font-size: 20px;
            animation: heartFloat 8s infinite;
            opacity: 0.6;
            z-index: 1;
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg) scale(1.5);
                opacity: 0;
            }
        }

        /* Stars */
        .star {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--soft-gold);
            border-radius: 50%;
            animation: twinkle 2s infinite;
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Falling Images (Flowers/Tulips) */
        .falling-image {
            position: fixed;
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 50%;
            animation: fall linear infinite;
            z-index: 1;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0.5;
            }
        }

        /* Container */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        .title {
            font-size: clamp(2rem, 6vw, 3.5rem);
            color: var(--white);
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.6);
            animation: fadeInZoom 1s ease-out;
        }

        @keyframes fadeInZoom {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--soft-gold);
            text-align: center;
            margin-bottom: 60px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Vinyl/DVD Record */
        .record-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 0 auto 60px;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        .record {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 0 50px rgba(0, 0, 0, 0.5);
            animation: spin 8s linear infinite;
            animation-play-state: paused;
        }

        .record.playing {
            animation-play-state: running;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .record-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--soft-gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .record-grooves {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle at center,
                transparent 0px,
                transparent 2px,
                rgba(255, 255, 255, 0.1) 2px,
                rgba(255, 255, 255, 0.1) 4px
            );
        }

        .record-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: var(--soft-gold);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        /* Audio Player */
        .player-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 1s ease-out 0.7s both;
        }

        .song-title {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            color: var(--white);
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .song-artist {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: var(--light-pink);
            margin-bottom: 30px;
            font-style: italic;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            border: none;
            color: var(--white);
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.6);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-slider {
            width: 100px;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 5px;
            background: var(--glass-border);
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--pink);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--glass-border);
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--pink), var(--purple));
            border-radius: 5px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--white);
        }

        /* Back Button */
        .back-btn {
            margin-top: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            color: var(--white);
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.5);
            background: rgba(255, 255, 255, 0.25);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .record-container {
                width: 280px;
                height: 280px;
            }

            .record-image {
                width: 100px;
                height: 100px;
            }

            .player-card {
                padding: 30px 20px;
            }

            .play-btn {
                width: 60px;
                height: 60px;
                font-size: 20px;
            }

            .volume-slider {
                width: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Hearts -->
    <div id="hearts"></div>

    <!-- Stars -->
    <div id="stars"></div>

    <!-- Container -->
    <div class="container">
        <h1 class="title">Our Song 🎵</h1>
        <p class="subtitle">A melody made with love</p>

        <!-- Vinyl/DVD Record -->
        <div class="record-container">
            <div class="record" id="record">
                <div class="record-grooves"></div>
                <img src="a.jpg" alt="Album Art" class="record-image" onerror="this.style.display='none'">
                <div class="record-center"></div>
            </div>
        </div>

        <!-- Audio Player -->
        <div class="player-card">
            <h2 class="song-title">Captivated</h2>
            <p class="song-artist">IV OF SPADES</p>

            <div class="controls">
                <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
                <div class="volume-control">
                    <span>🔊</span>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" onchange="changeVolume()">
                </div>
            </div>

            <div class="progress-container" id="progressContainer" onclick="seek(event)">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>

            <audio id="audio" autoplay>
                <source src="IV OF SPADES - Captivated (Official Audio).mp3" type="audio/mpeg">
            </audio>
        </div>

        <a href="choices.html" class="back-btn">← Back to Choices</a>
    </div>

    <script>
        // Create Particles
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#FF69B4', '#FFD700', '#FFFFFF', '#9B59B6', '#FFB6C1'];
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = Math.random() * 10 + 5 + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = Math.random() * 10 + 10 + 's';
                container.appendChild(particle);
            }
        }

        // Create Hearts
        function createHearts() {
            const container = document.getElementById('hearts');
            
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = Math.random() * 20 + 15 + 'px';
                heart.style.animationDelay = Math.random() * 8 + 's';
                heart.style.animationDuration = Math.random() * 5 + 5 + 's';
                container.appendChild(heart);
            }
        }

        // Create Stars
        function createStars() {
            const container = document.getElementById('stars');
            
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }

        // Create Falling Images (Flowers/Tulips)
        function createFallingImages() {
            const images = ['brah.jpg', 'yjpg.jpg', 'rah.jpg', 'nyark.jpg'];
            
            for (let i = 0; i < 20; i++) {
                const img = document.createElement('img');
                img.className = 'falling-image';
                img.src = images[Math.floor(Math.random() * images.length)];
                img.style.left = Math.random() * 100 + '%';
                img.style.animationDuration = Math.random() * 8 + 8 + 's';
                img.style.animationDelay = Math.random() * 15 + 's';
                img.onerror = function() {
                    this.style.display = 'none';
                };
                document.body.appendChild(img);
            }
        }

        // Audio Player
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const record = document.getElementById('record');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        let isPlaying = false;

        // Save audio state to localStorage
        function saveAudioState() {
            localStorage.setItem('audioCurrentTime', audio.currentTime);
            localStorage.setItem('audioIsPlaying', isPlaying);
        }

        // Restore audio state from localStorage
        function restoreAudioState() {
            const savedTime = localStorage.getItem('audioCurrentTime');
            const savedPlaying = localStorage.getItem('audioIsPlaying');
            
            if (savedTime) {
                audio.currentTime = parseFloat(savedTime);
            }
            
            if (savedPlaying === 'true') {
                audio.play().then(() => {
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                    record.classList.add('playing');
                }).catch(e => {
                    console.log('Auto-play prevented by browser:', e);
                    isPlaying = false;
                    playBtn.textContent = '▶';
                    record.classList.remove('playing');
                });
            } else {
                isPlaying = false;
                playBtn.textContent = '▶';
                record.classList.remove('playing');
            }
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
                record.classList.remove('playing');
            } else {
                audio.play();
                playBtn.textContent = '⏸';
                record.classList.add('playing');
            }
            isPlaying = !isPlaying;
            saveAudioState();
        }

        function changeVolume() {
            const volume = document.getElementById('volumeSlider').value / 100;
            audio.volume = volume;
        }

        function updateProgress() {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percent + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
        }

        function setDuration() {
            durationEl.textContent = formatTime(audio.duration);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function seek(event) {
            const width = progressContainer.clientWidth;
            const clickX = event.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        }

        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', setDuration);
        audio.addEventListener('ended', () => {
            isPlaying = false;
            playBtn.textContent = '▶';
            record.classList.remove('playing');
        });

        // Initialize
        window.addEventListener('load', () => {
            createParticles();
            createHearts();
            createStars();
            createFallingImages();
            
            // Restore audio state
            restoreAudioState();
            
            // Save state periodically
            setInterval(saveAudioState, 1000);
        });

        // Save state before page unload
        window.addEventListener('beforeunload', saveAudioState);
    </script>
</body>
</html>
