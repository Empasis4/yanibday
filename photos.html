<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos of Yani ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink: #FF69B4;
            --rose-gold: #B76E79;
            --white: #FFFFFF;
            --purple: #9B59B6;
            --soft-gold: #FFD700;
            --light-pink: #FFB6C1;
            --dark-pink: #FF1493;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #ffd89b 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.7;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Floating Hearts */
        .heart {
            position: fixed;
            font-size: 20px;
            animation: heartFloat 8s infinite;
            opacity: 0.6;
            z-index: 1;
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg) scale(1.5);
                opacity: 0;
            }
        }

        /* Stars */
        .star {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--soft-gold);
            border-radius: 50%;
            animation: twinkle 2s infinite;
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Falling Images (Flowers/Tulips) */
        .falling-image {
            position: fixed;
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 50%;
            animation: fall linear infinite;
            z-index: 1;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0.5;
            }
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        .title {
            font-size: clamp(2rem, 6vw, 3.5rem);
            color: var(--white);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.6);
            animation: fadeInZoom 1s ease-out;
        }

        @keyframes fadeInZoom {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--soft-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Gallery */
        .gallery-container {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            cursor: pointer;
            aspect-ratio: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.8s ease-out both;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.4);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: var(--white);
            cursor: pointer;
            transition: color 0.3s ease;
            z-index: 1001;
        }

        .lightbox-close:hover {
            color: var(--pink);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
            color: var(--white);
            cursor: pointer;
            transition: color 0.3s ease;
            z-index: 1001;
            padding: 20px;
        }

        .lightbox-nav:hover {
            color: var(--pink);
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        /* Back Button */
        .back-btn {
            display: inline-block;
            margin: 40px auto;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            color: var(--white);
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            position: relative;
            z-index: 2;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.5);
            background: rgba(255, 255, 255, 0.25);
        }

        .back-container {
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .lightbox-nav {
                font-size: 30px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Hearts -->
    <div id="hearts"></div>

    <!-- Stars -->
    <div id="stars"></div>

    <!-- Header -->
    <div class="header">
        <h1 class="title">Photos of Yani ❤️</h1>
        <p class="subtitle">Beautiful moments captured forever</p>
    </div>

    <!-- Gallery -->
    <div class="gallery-container">
        <div class="gallery" id="gallery"></div>
    </div>

    <!-- Back Button -->
    <div class="back-container">
        <a href="choices.html" class="back-btn">← Back to Choices</a>
    </div>

    <!-- Music Player -->
    <div class="music-player" style="position: fixed; bottom: 30px; right: 30px; background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; z-index: 100; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);">
        <div style="display: flex; align-items: center; gap: 15px;">
            <button id="playBtn" onclick="togglePlay()" style="width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--pink), var(--purple)); border: none; color: var(--white); font-size: 20px; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; display: flex; align-items: center; justify-content: center;">▶</button>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span>🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="50" onchange="changeVolume()" style="width: 80px; -webkit-appearance: none; height: 5px; border-radius: 5px; background: var(--glass-border); outline: none;">
            </div>
        </div>
        <audio id="audio" loop autoplay>
            <source src="IV OF SPADES - Captivated (Official Audio).mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)">&#10094;</span>
        <img id="lightbox-img" src="" alt="Gallery Image">
        <span class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)">&#10095;</span>
    </div>

    <script>
        // Image files from a.jpg to v.jpg
        const imageFiles = ['a.jpg', 'b.jpg', 'c.jpg', 'd.jpg', 'e.jpg', 'f.jpg', 'g.jpg', 'h.jpg', 'i.jpg', 'j.jpg', 'k.jpg', 'l.jpg', 'm.jpg', 'n.jpg', 'o.jpg', 'p.jpg', 'q.jpg', 'r.jpg', 's.jpg', 't.jpg', 'u.jpg', 'v.jpg'];
        let currentImageIndex = 0;

        // Create Particles
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#FF69B4', '#FFD700', '#FFFFFF', '#9B59B6', '#FFB6C1'];
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = Math.random() * 10 + 5 + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = Math.random() * 10 + 10 + 's';
                container.appendChild(particle);
            }
        }

        // Create Hearts
        function createHearts() {
            const container = document.getElementById('hearts');
            
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = Math.random() * 20 + 15 + 'px';
                heart.style.animationDelay = Math.random() * 8 + 's';
                heart.style.animationDuration = Math.random() * 5 + 5 + 's';
                container.appendChild(heart);
            }
        }

        // Create Stars
        function createStars() {
            const container = document.getElementById('stars');
            
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }

        // Create Falling Images (Flowers/Tulips)
        function createFallingImages() {
            const images = ['brah.jpg', 'yjpg.jpg', 'rah.jpg', 'nyark.jpg'];
            
            for (let i = 0; i < 20; i++) {
                const img = document.createElement('img');
                img.className = 'falling-image';
                img.src = images[Math.floor(Math.random() * images.length)];
                img.style.left = Math.random() * 100 + '%';
                img.style.animationDuration = Math.random() * 8 + 8 + 's';
                img.style.animationDelay = Math.random() * 15 + 's';
                img.onerror = function() {
                    this.style.display = 'none';
                };
                document.body.appendChild(img);
            }
        }

        // Create Gallery
        function createGallery() {
            const gallery = document.getElementById('gallery');
            
            imageFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.style.animationDelay = (index * 0.1) + 's';
                
                const img = document.createElement('img');
                img.src = file;
                img.alt = `Photo ${index + 1}`;
                img.onerror = function() {
                    this.style.display = 'none';
                    item.innerHTML = `<span style="font-size: 3rem; color: var(--white);">📸</span>`;
                };
                
                item.appendChild(img);
                item.onclick = () => openLightbox(index);
                gallery.appendChild(item);
            });
        }

        // Lightbox Functions
        function openLightbox(index) {
            currentImageIndex = index;
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = imageFiles[index];
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function navigateLightbox(direction) {
            currentImageIndex += direction;
            if (currentImageIndex < 0) {
                currentImageIndex = imageFiles.length - 1;
            } else if (currentImageIndex >= imageFiles.length) {
                currentImageIndex = 0;
            }
            document.getElementById('lightbox-img').src = imageFiles[currentImageIndex];
        }

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').classList.contains('active')) {
                if (e.key === 'Escape') {
                    closeLightbox();
                } else if (e.key === 'ArrowLeft') {
                    navigateLightbox(-1);
                } else if (e.key === 'ArrowRight') {
                    navigateLightbox(1);
                }
            }
        });

        // Close lightbox on background click
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') {
                closeLightbox();
            }
        });

        // Music Player
        let isPlaying = false;
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');

        // Save audio state to localStorage
        function saveAudioState() {
            localStorage.setItem('audioCurrentTime', audio.currentTime);
            localStorage.setItem('audioIsPlaying', isPlaying);
        }

        // Restore audio state from localStorage
        function restoreAudioState() {
            const savedTime = localStorage.getItem('audioCurrentTime');
            const savedPlaying = localStorage.getItem('audioIsPlaying');
            
            if (savedTime) {
                audio.currentTime = parseFloat(savedTime);
            }
            
            if (savedPlaying === 'true') {
                audio.play().then(() => {
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                }).catch(e => {
                    console.log('Auto-play prevented by browser:', e);
                    isPlaying = false;
                    playBtn.textContent = '▶';
                });
            } else {
                isPlaying = false;
                playBtn.textContent = '▶';
            }
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
            } else {
                audio.play().catch(e => console.log('Audio play failed:', e));
                playBtn.textContent = '⏸';
            }
            isPlaying = !isPlaying;
            saveAudioState();
        }

        function changeVolume() {
            const volume = document.getElementById('volumeSlider').value / 100;
            audio.volume = volume;
        }

        // Initialize
        window.addEventListener('load', () => {
            createParticles();
            createHearts();
            createStars();
            createGallery();
            createFallingImages();
            
            // Restore audio state
            restoreAudioState();
            
            // Save state periodically
            setInterval(saveAudioState, 1000);
        });

        // Save state before page unload
        window.addEventListener('beforeunload', saveAudioState);
    </script>
</body>
</html>
